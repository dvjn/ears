<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ears</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header">
    <h2>ears</h2>
    <span id="state-badge" class="badge idle">idle</span>
  </div>

  <div class="record-area">
    <button id="record-btn" class="record-btn">
      <span class="record-icon"></span>
      <span id="record-label">Record</span>
    </button>
  </div>

  <section>
    <h3>Last Transcription</h3>
    <div id="last-text" class="last-text empty">Nothing transcribed yet.</div>
    <div style="display:flex; gap:6px; margin-top:6px;">
      <button class="sm" id="copy-btn" disabled>Copy again</button>
    </div>
  </section>

  <section>
    <h3>History</h3>
    <div id="history-list" class="history-list">
      <div class="history-empty">No history yet.</div>
    </div>
  </section>

  <section>
    <h3>Models</h3>
    <div id="models-list"></div>
  </section>

  <section>
    <h3>Settings</h3>
    <div class="form-row">
      <label>Active model</label>
      <select id="model-select"></select>
    </div>
    <div class="form-row">
      <label>Language</label>
      <select id="language-select">
        <option value="auto">Auto-detect</option>
        <option value="en" selected>English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
        <option value="ko">Korean</option>
        <option value="it">Italian</option>
        <option value="nl">Dutch</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
      </select>
    </div>
    <div class="form-row">
      <label>Max duration (s)</label>
      <input id="max-duration-input" type="number" min="5" max="600" value="120" />
    </div>
    <div class="save-row">
      <button id="save-btn">Save Settings</button>
    </div>
  </section>

  <section>
    <h3>CLI Trigger</h3>
    <div style="color:var(--text-dim); font-size:12px; line-height:1.6;">
      Bind this in your hotkey manager:<br>
      <code style="background:var(--bg);padding:3px 7px;border-radius:4px;display:inline-block;margin-top:4px;user-select:all;">ears toggle</code>
    </div>
  </section>

  <div id="toast" class="toast"></div>

  <script src="main.js"></script>
</body>
</html>
